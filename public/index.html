<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ═══════════════════════════════════════════
         VIEWPORT & THEME
    ═══════════════════════════════════════════ -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1B3D2F" />
    <meta name="color-scheme" content="light" />

    <!-- ═══════════════════════════════════════════
         PRIMARY SEO
    ═══════════════════════════════════════════ -->
    <title>Munji Consulting | Specialist Recruitment Agency – South Africa</title>

    <meta
      name="description"
      content="Munji Consulting is a specialist recruitment agency connecting top talent with leading employers across Engineering, Construction, Mining, FMCG, Architecture, Supply Chain, and Logistics in South Africa and beyond."
    />

    <meta
      name="keywords"
      content="recruitment agency South Africa, engineering recruitment, construction jobs, mining recruitment, FMCG recruitment, logistics recruitment, supply chain jobs, architecture recruitment, executive search South Africa, Malunji Consulting"
    />

    <meta name="author" content="Munji Consulting" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <link rel="canonical" href="https://www.mujiconsulting.co.za/" />

    <!-- ═══════════════════════════════════════════
         OPEN GRAPH (Facebook / LinkedIn)
    ═══════════════════════════════════════════ -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Munji Consulting" />
    <meta property="og:locale"      content="en_ZA" />
    <meta property="og:url"         content="https://www.mujiconsulting.co.za/" />
    <meta property="og:title"       content="Munji Consulting | Specialist Recruitment Agency – South Africa" />
    <meta
      property="og:description"
      content="Aligning the right talent with the right opportunities. Specialist recruitment across Engineering, Construction, Mining, FMCG, Architecture, Supply Chain &amp; Logistics."
    />
    <meta property="og:image"       content="https://www.mujiconsulting.co.za/og-cover.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="Munji Consulting – Specialist Recruitment Agency" />

    <!-- ═══════════════════════════════════════════
         TWITTER / X CARD
    ═══════════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@MunjiConsult" />
    <meta name="twitter:title"       content="Munji Consulting | Specialist Recruitment Agency" />
    <meta
      name="twitter:description"
      content="End-to-end recruitment solutions in Engineering, Construction, Mining, FMCG, Architecture, Supply Chain &amp; Logistics across South Africa."
    />
    <meta name="twitter:image"       content="https://www.mujiconsulting.co.za/og-cover.jpg" />
    <meta name="twitter:image:alt"   content="Munji Consulting" />

    <!-- ═══════════════════════════════════════════
         STRUCTURED DATA – Organisation (JSON-LD)
    ═══════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EmploymentAgency",
      "name": "Munji Consulting",
      "url": "https://www.mujiconsulting.co.za",
      "logo": "https://www.mujiconsulting.co.za/logo192.png",
      "image": "https://www.mujiconsulting.co.za/og-cover.jpg",
      "description": "Specialist recruitment agency connecting top talent with leading employers across Engineering, Construction, Mining, FMCG, Architecture, Supply Chain, and Logistics.",
      "telephone": "+27-000-000-0000",
      "email": "info@mujiconsulting.co.za",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "ZA",
        "addressRegion": "Gauteng"
      },
      "areaServed": [
        { "@type": "Country", "name": "South Africa" }
      ],
      "knowsAbout": [
        "Engineering Recruitment",
        "Construction Recruitment",
        "Mining Recruitment",
        "FMCG Recruitment",
        "Architecture Recruitment",
        "Supply Chain Recruitment",
        "Logistics Recruitment"
      ],
      "sameAs": [
        "https://www.linkedin.com/company/munji-consulting"
      ]
    }
    </script>

    <!-- ═══════════════════════════════════════════
         STRUCTURED DATA – WebSite + SiteLinks Search
    ═══════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Munji Consulting",
      "url": "https://www.mujiconsulting.co.za",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.mujiconsulting.co.za/careers?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ═══════════════════════════════════════════
         FAVICONS & ICONS
    ═══════════════════════════════════════════ -->
    <link rel="icon"             href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon"             href="%PUBLIC_URL%/favicon-32x32.png" sizes="32x32" type="image/png" />
    <link rel="icon"             href="%PUBLIC_URL%/favicon-16x16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest"         href="%PUBLIC_URL%/manifest.json" />

    <!-- ═══════════════════════════════════════════
         PERFORMANCE – Preconnect & DNS Prefetch
    ═══════════════════════════════════════════ -->
    <!-- API origin -->
    <link rel="preconnect" href="https://www.mujiconsulting.co.za" crossorigin />
    <!-- Google Fonts (if used in future) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Analytics (replace with your provider) -->
    <!-- <link rel="preconnect" href="https://www.google-analytics.com" /> -->

    <!-- ═══════════════════════════════════════════
         GEO & REGIONAL
    ═══════════════════════════════════════════ -->
    <meta name="geo.region"       content="ZA-GP" />
    <meta name="geo.placename"    content="Gauteng, South Africa" />
    <meta name="language"         content="en-ZA" />
    <meta http-equiv="content-language" content="en-ZA" />

    <!-- ═══════════════════════════════════════════
         SECURITY HEADERS (supplement server-side headers)
    ═══════════════════════════════════════════ -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options"        content="SAMEORIGIN" />
    <meta http-equiv="Referrer-Policy"        content="strict-origin-when-cross-origin" />

    <!-- ═══════════════════════════════════════════
         APPLE / PWA EXTRAS
    ═══════════════════════════════════════════ -->
    <meta name="apple-mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title"            content="Munji Consulting" />
    <meta name="application-name"                      content="Munji Consulting" />
    <meta name="msapplication-TileColor"               content="#1B3D2F" />
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to use the Munji Consulting recruitment platform.
    </noscript>

    <!--
      ACCESSIBILITY: Skip-to-content link injected by the React app.
      If your Header component doesn't already include one, add:
        <a href="#main-content" class="skip-link">Skip to main content</a>
      at the top of your Header component.
    -->
    <div id="root"></div>

    <!--
      Build step automatically injects bundled JS here.
      Run `npm run build` or `yarn build` to generate the production bundle.
    -->
  </body>
</html>
