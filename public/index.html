<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <!-- ═══════════════════════════════════════════
         VIEWPORT & THEME
    ═══════════════════════════════════════════ -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1B3D2F" />
    <meta name="color-scheme" content="light" />

    <!-- ═══════════════════════════════════════════
         PRIMARY SEO
    ═══════════════════════════════════════════ -->
    <title>Muji Consulting Services – South Africa</title>

    <meta
      name="description"
      content="Muji Consulting Services connects exceptional professionals with the right opportunities across Engineering, Construction, Mining, FMCG, Architecture, Supply Chain, and Logistics in South Africa."
    />

    <meta
      name="keywords"
      content="talent solutions South Africa, engineering jobs, construction jobs, mining jobs, FMCG jobs, logistics jobs, supply chain jobs, architecture jobs, executive placement South Africa, Muji Consulting Services"
    />

    <meta name="author" content="Muji Consulting Services" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />

    <link rel="canonical" href="https://www.mujiconsulting.co.za/" />

    <!-- ═══════════════════════════════════════════
         OPEN GRAPH (Facebook / LinkedIn)
    ═══════════════════════════════════════════ -->
    <meta property="og:type"         content="website" />
    <meta property="og:site_name"    content="Muji Consulting Services" />
    <meta property="og:locale"       content="en_ZA" />
    <meta property="og:url"          content="https://www.mujiconsulting.co.za/" />
    <meta property="og:title"        content="Muji Consulting Services – South Africa" />
    <meta
      property="og:description"
      content="Aligning the right talent with the right opportunities across Engineering, Construction, Mining, FMCG, Architecture, Supply Chain &amp; Logistics."
    />
    <meta property="og:image"        content="https://www.mujiconsulting.co.za/og-cover.jpg" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="Muji Consulting Services" />

    <!-- ═══════════════════════════════════════════
         TWITTER / X CARD
    ═══════════════════════════════════════════ -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@MujiConsult" />
    <meta name="twitter:title"       content="Muji Consulting Services" />
    <meta
      name="twitter:description"
      content="People-first talent solutions across Engineering, Construction, Mining, FMCG, Architecture, Supply Chain &amp; Logistics in South Africa."
    />
    <meta name="twitter:image"       content="https://www.mujiconsulting.co.za/og-cover.jpg" />
    <meta name="twitter:image:alt"   content="Muji Consulting Services" />

    <!-- ═══════════════════════════════════════════
         STRUCTURED DATA – Organisation (JSON-LD)
    ═══════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Muji Consulting Services",
      "url": "https://www.mujiconsulting.co.za",
      "logo": "https://www.mujiconsulting.co.za/logo192.png",
      "image": "https://www.mujiconsulting.co.za/og-cover.jpg",
      "description": "A South African talent solutions partner connecting exceptional professionals with the right opportunities across Engineering, Construction, Mining, FMCG, Architecture, Supply Chain, and Logistics.",
      "telephone": "+27-000-000-0000",
      "email": "info@mujiconsulting.co.za",
      "address": {
        "@type": "PostalAddress",
        "addressCountry": "ZA",
        "addressRegion": "Gauteng"
      },
      "areaServed": [
        { "@type": "Country", "name": "South Africa" }
      ],
      "knowsAbout": [
        "Engineering Placements",
        "Construction Placements",
        "Mining Placements",
        "FMCG Placements",
        "Architecture Placements",
        "Supply Chain Placements",
        "Logistics Placements"
      ],
      "sameAs": [
        "https://www.linkedin.com/company/muji-consulting"
      ]
    }
    </script>

    <!-- ═══════════════════════════════════════════
         STRUCTURED DATA – WebSite + SiteLinks Search
    ═══════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Muji Consulting Services",
      "url": "https://www.mujiconsulting.co.za",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.mujiconsulting.co.za/careers?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ═══════════════════════════════════════════
         FAVICONS & ICONS
    ═══════════════════════════════════════════ -->
    <link rel="icon"             href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon"             href="%PUBLIC_URL%/favicon-32x32.png" sizes="32x32" type="image/png" />
    <link rel="icon"             href="%PUBLIC_URL%/favicon-16x16.png" sizes="16x16" type="image/png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- manifest & all PWA tags removed — prevents browser install prompt -->

    <!-- ═══════════════════════════════════════════
         PERFORMANCE – Preconnect & DNS Prefetch
    ═══════════════════════════════════════════ -->
    <link rel="preconnect" href="https://www.mujiconsulting.co.za" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ═══════════════════════════════════════════
         GEO & REGIONAL
    ═══════════════════════════════════════════ -->
    <meta name="geo.region"    content="ZA-GP" />
    <meta name="geo.placename" content="Gauteng, South Africa" />
    <meta name="language"      content="en-ZA" />
    <meta http-equiv="content-language" content="en-ZA" />

    <!-- ═══════════════════════════════════════════
         SECURITY HEADERS
    ═══════════════════════════════════════════ -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options"        content="SAMEORIGIN" />
    <meta http-equiv="Referrer-Policy"        content="strict-origin-when-cross-origin" />

  </head>

  <body>
    <noscript>
      You need to enable JavaScript to use Muji Consulting Services.
    </noscript>
    <div id="root"></div>
  </body>
</html>
